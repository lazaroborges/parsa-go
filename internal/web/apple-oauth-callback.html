<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completing Sign In...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2 id="message">Completing Sign In...</h2>
        <p id="submessage">Redirecting to app...</p>
    </div>

    <script>
        var authCode = {{.CodeJSON}};
        var error = {{.ErrorJSON}};
        var scheme = {{.SchemeJSON}};

        var deepLinkBase = scheme + '://oauth-callback';

        if (error) {
            document.getElementById('message').textContent = 'Authentication Failed';
            document.getElementById('message').className = 'error';
            document.getElementById('submessage').textContent = 'Redirecting...';

            var errorRedirect = deepLinkBase + '?error=' + encodeURIComponent(error);
            window.location.href = errorRedirect;
            setTimeout(function() { window.location.href = errorRedirect; }, 1000);
        } else if (authCode) {
            var codeRedirect = deepLinkBase + '?code=' + encodeURIComponent(authCode);
            window.location.href = codeRedirect;
            setTimeout(function() { window.location.href = codeRedirect; }, 500);
            setTimeout(function() {
                document.getElementById('submessage').innerHTML =
                    'If you are not redirected, <a href="' + codeRedirect + '" style="color: #4dabf7;">click here</a>';
            }, 2000);
        } else {
            document.getElementById('message').textContent = 'Invalid Response';
            document.getElementById('message').className = 'error';
            document.getElementById('submessage').textContent = 'Please try again';
        }
    </script>
</body>
</html>
